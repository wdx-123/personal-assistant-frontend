name: cd-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-prod-deploy
  cancel-in-progress: false

env:
  WEB_IMAGE_NAME: ghcr.io/wdx-123/assist-frontend
  DEPLOY_DIR: /opt/assist-backed
  # 前端部署完成后，默认检查这个地址是否通
  # 如果你没配 WEB_HEALTH_URL secret，就用它
  DEFAULT_HEALTH_URL: http://127.0.0.1/
  # 前端部署完成后，默认使用这个镜像
  DEFAULT_APP_IMAGE_NAME: ghcr.io/wdx-123/assist-backed
  # 前端部署完成后，默认使用这个镜像标签
  DEFAULT_APP_IMAGE_TAG: latest

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint check
        run: npm run lint:check

      - name: Build production bundle
        run: npm run build

  build_and_push:
    runs-on: ubuntu-latest
    needs:
      - verify
    outputs:
      image_tag_sha: ${{ steps.meta.outputs.image_tag_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: echo "image_tag_sha=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag_sha }}
            ${{ env.WEB_IMAGE_NAME }}:main
            ${{ env.WEB_IMAGE_NAME }}:latest

  deploy_prod:
    runs-on: ubuntu-latest
    needs:
      - build_and_push
    steps:
      - name: Validate SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          if ssh-keygen -F "${{ secrets.SSH_HOST }}" -f ~/.ssh/known_hosts >/dev/null; then
            exit 0
          fi
          ssh-keygen -F "[${{ secrets.SSH_HOST }}]:${{ secrets.SSH_PORT }}" -f ~/.ssh/known_hosts >/dev/null

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 5m
          script_stop: true
          script: |
            mkdir -p "${{ env.DEPLOY_DIR }}"

      - name: Deploy and health check
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PULL_USER: ${{ secrets.GHCR_PULL_USER }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          WEB_HEALTH_URL: ${{ secrets.WEB_HEALTH_URL }}
          WEB_IMAGE_NAME: ${{ env.WEB_IMAGE_NAME }}
          WEB_IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag_sha }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          DEFAULT_HEALTH_URL: ${{ env.DEFAULT_HEALTH_URL }}
          DEFAULT_APP_IMAGE_NAME: ${{ env.DEFAULT_APP_IMAGE_NAME }}
          DEFAULT_APP_IMAGE_TAG: ${{ env.DEFAULT_APP_IMAGE_TAG }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          envs: GHCR_PULL_USER,GHCR_PULL_TOKEN,WEB_HEALTH_URL,WEB_IMAGE_NAME,WEB_IMAGE_TAG,DEPLOY_DIR,DEFAULT_HEALTH_URL,DEFAULT_APP_IMAGE_NAME,DEFAULT_APP_IMAGE_TAG
          script: |
            set -euo pipefail

            read_env_value() {
              key="$1"
              file="$2"
              if [ -f "$file" ]; then
                sed -n "s/^${key}=//p" "$file" | tail -n 1
              fi
            }

            write_deploy_env() {
              cat > .deploy.env <<EOF
            IMAGE_NAME=$app_image_name
            IMAGE_TAG=$app_image_tag
            WEB_IMAGE_NAME=$web_image_name
            WEB_IMAGE_TAG=$web_image_tag
            EOF
            }

            cd "$DEPLOY_DIR"

            if [ ! -f ".env" ]; then
              echo "missing $DEPLOY_DIR/.env"
              exit 1
            fi

            if [ ! -f "docker-compose.prod.yml" ]; then
              echo "missing $DEPLOY_DIR/docker-compose.prod.yml"
              exit 1
            fi

            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USER" --password-stdin

            touch .deploy.env

            exec 9>.deploy.lock
            flock 9

            app_image_name="$(read_env_value IMAGE_NAME .deploy.env)"
            if [ -z "$app_image_name" ]; then
              app_image_name="$DEFAULT_APP_IMAGE_NAME"
            fi

            app_image_tag="$(read_env_value IMAGE_TAG .deploy.env)"
            if [ -z "$app_image_tag" ]; then
              app_image_tag="$DEFAULT_APP_IMAGE_TAG"
            fi

            web_image_name="$WEB_IMAGE_NAME"
            web_image_tag="$WEB_IMAGE_TAG"

            last_success_tag=""
            if [ -f .last_success_web_tag ]; then
              last_success_tag="$(cat .last_success_web_tag)"
            fi

            deploy_failed=0

            write_deploy_env

            docker compose -f docker-compose.prod.yml --env-file .deploy.env pull web || deploy_failed=1
            if [ "$deploy_failed" -eq 0 ]; then
              docker compose -f docker-compose.prod.yml --env-file .deploy.env up -d web || deploy_failed=1
            fi

            health_url="${WEB_HEALTH_URL:-}"
            if [ -z "$health_url" ]; then
              health_url="$DEFAULT_HEALTH_URL"
            fi

            if [ "$deploy_failed" -eq 0 ]; then
              health_ok=0
              for i in $(seq 1 30); do
                if curl -fsS "$health_url" >/dev/null; then
                  health_ok=1
                  break
                fi
                sleep 2
              done

              if [ "$health_ok" -eq 1 ]; then
                echo "$WEB_IMAGE_TAG" > .last_success_web_tag
                echo "deploy success"
                exit 0
              fi
            fi

            echo "deploy failed, start rollback"
            if [ -n "$last_success_tag" ]; then
              web_image_tag="$last_success_tag"
              write_deploy_env
              docker compose -f docker-compose.prod.yml --env-file .deploy.env pull web || true
              docker compose -f docker-compose.prod.yml --env-file .deploy.env up -d web || true
            else
              echo "no rollback target found"
            fi

            exit 1
